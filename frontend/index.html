<!DOCTYPE html>
<html lang="de">
<head>
    <title>My App</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="index.ts" defer></script>
</head>
<body>
    <div class="flex-container" style="flex-direction: row">
        <div class="flex-container" style="margin-top: 3rem">
            <form id="login-form" class="login-form">
                <h3 class="header-in-form">Login</h3>
                <label for="email" class="space" style="color: white">Email</label><br>
                <input id="email" type="email" placeholder="Email" class="space input-field"/><br>
                <label for="password" class="space" style="color: white">Password</label><br>
                <input id="password" type="password" placeholder="Password" class="space input-field"/><br>
                <div class="flex-container">
                <input type="submit" value="Login" class="space login-button"/>
                <button type="button" id="logout-button" class="space logout-button">Logout</button>
                </div>
            </form>
        </div>
        <div class="flex-container" style="margin-top: 3rem">
            <form id="register-form" class="login-form">
                <h3 class="header-in-form">Register</h3>
                <label for="email-register" class="space" style="color: white">Email</label><br>
                <input id="email-register" type="email" placeholder="Email" class="space input-field"/><br>
                <label for="password-register" class="space" style="color: white">Password</label><br>
                <input id="password-register" type="password" placeholder="Password" class="space input-field"/><br>
                <div class="flex-container">
                    <input type="submit" value="Register" class="space login-button"/>

                </div>
            </form>
        </div>
    </div>
    <div class="flex-container" style="margin-top: 3rem; flex-direction: column">
        <div class="flex-container" style="margin-top: 3rem; flex-direction: column">
            <button id="fetch-cars" class="fetchCarsButton">Lade Autos</button>
            <table id="cars-table">
            </table>
        </div>
        <div class="flex-container" style="margin-top: 3rem; flex-direction: column">
            <input id="car-id" type="text" placeholder="Car Id" class="space car-input"/><br>
            <button id="fetch-specific-car" class="fetchCarsButton">Lade Auto</button>
            <table id="car-table">
            </table>
        </div>

    </div>



</body>
</html>
